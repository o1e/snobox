[defaults]
# ------------------------------------------------------------
# Project structure
# ------------------------------------------------------------
inventory               = ./inventory/inventory.yml
roles_path              = ./roles
collections_paths       = ./collections:~/.ansible/collections:/usr/share/ansible/collections
library                 = ./library
module_utils            = ./module_utils

# ------------------------------------------------------------
# Logging (always inside the project)
# ------------------------------------------------------------
log_path                = ./log/ansible.log

# ------------------------------------------------------------
# Output / UX
# ------------------------------------------------------------
stdout_callback         = default
callback_result_format  = yaml
bin_ansible_callbacks   = True
display_skipped_hosts   = False

# Enable useful callbacks.
# profile_tasks shows task timings in the output.
callbacks_enabled       = profile_tasks

# ------------------------------------------------------------
# Performance / behavior
# ------------------------------------------------------------
forks                   = 20
timeout                 = 30
interpreter_python      = auto_silent

# Keep play execution deterministic and readable.
retry_files_enabled     = False

# ------------------------------------------------------------
# Safety / pragmatism for infra automation
# ------------------------------------------------------------
host_key_checking       = False
deprecation_warnings    = False

# ------------------------------------------------------------
# Facts / caching
# ------------------------------------------------------------
gathering               = smart
fact_caching            = jsonfile
fact_caching_connection = ./.ansible/facts
fact_caching_timeout    = 7200

# ------------------------------------------------------------
# Misc defaults
# ------------------------------------------------------------
# Keep temporary files inside the project when needed for debugging.
# local_tmp             = ./.ansible/tmp
# remote_tmp            = /tmp/.ansible-${USER}/tmp

[inventory]
# ------------------------------------------------------------
# Inventory plugins
# ------------------------------------------------------------
enable_plugins = host_list, script, auto, yaml, ini, toml

[privilege_escalation]
# ------------------------------------------------------------
# Become defaults
# ------------------------------------------------------------
# become          = True
become_method   = sudo
become_ask_pass = False

[ssh_connection]
# ------------------------------------------------------------
# SSH tuning (stable for EE + many tasks)
# ------------------------------------------------------------
pipelining      = True
ssh_args        = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30 -o ServerAliveCountMax=3
control_path    = %(directory)s/%%h-%%p-%%r

[persistent_connection]
# ------------------------------------------------------------
# Persistent/network connection timeouts
# ------------------------------------------------------------
connect_timeout = 30
command_timeout = 60
