---
- name: Validate required secret inputs for install-config
  ansible.builtin.assert:
    that:
      - sno_prep_ssh_public_key is defined
      - sno_prep_ssh_public_key | length > 0
      - not (_sno_prep_pullsecret_required | default(false) | bool) or _pullsecret is defined
      - not (_sno_prep_pullsecret_required | default(false) | bool) or _pullsecret | length > 0
    fail_msg: >-
      Missing required secrets: ssh public key and, when required, _pullsecret.
  no_log: true

- name: Create install-config.yaml
  ansible.builtin.template:
    src: install_config_snobox.j2
    dest: "{{ sno_prep_workdirs.ocp }}/install-config.yaml"
    mode: "0600"
  delegate_to: localhost
  no_log: true

- name: Create Reference install-config.yaml
  ansible.builtin.template:
    src: install_config_snobox.j2
    dest: "{{ sno_prep_workdirs.ocp }}/install-config.yaml.orig"
    mode: "0600"
  delegate_to: localhost
  no_log: true

- name: Render static NetworkManager profile
  ansible.builtin.template:
    src: ignition_net_static_nmconnection.j2
    dest: "{{ sno_prep_workdirs.ocp }}/{{ sno_prep_box.hostname }}.nmconnection"
    mode: "0600"
  delegate_to: localhost
  when:
    - sno_net.type == 'bridge'
    - sno_net.bridge.mode == 'static'

- name: Read rendered static NetworkManager profile
  ansible.builtin.slurp:
    src: "{{ sno_prep_workdirs.ocp }}/{{ sno_prep_box.hostname }}.nmconnection"
  delegate_to: localhost
  register: _sno_prep_nmconnection
  when:
    - sno_net.type == 'bridge'
    - sno_net.bridge.mode == 'static'

- name: Generate ignition config (single-node)
  ansible.builtin.command: >
    {{ sno_prep_workdirs.bin }}/openshift-install
    --dir {{ sno_prep_workdirs.ocp }}
    create single-node-ignition-config
  args:
    creates: "{{ sno_prep_workdirs.ocp }}/bootstrap-in-place-for-live-iso.ign"
  delegate_to: localhost

- name: Read bootstrap-in-place live ISO ignition
  ansible.builtin.slurp:
    src: "{{ sno_prep_workdirs.ocp }}/bootstrap-in-place-for-live-iso.ign"
  delegate_to: localhost
  register: _sno_prep_live_ignition

- name: Parse bootstrap-in-place live ISO ignition
  ansible.builtin.set_fact:
    _sno_prep_live_ignition_json: "{{ _sno_prep_live_ignition.content | b64decode | from_json }}"
    _sno_prep_nmconnection_path: "/etc/NetworkManager/system-connections/{{ sno_prep_box.hostname }}.nmconnection"

- name: Add hostname persistence to bootstrap ignition
  ansible.builtin.copy:
    # Write updated ignition back to disk
    dest: "{{ sno_prep_workdirs.ocp }}/bootstrap-in-place-for-live-iso.ign"
    mode: "0600"
    # Render final ignition JSON
    content: "{{ updated_ignition | to_nice_json }}"
  delegate_to: localhost
  vars:

    # Existing ignition storage.files entries
    current_files: "{{ _sno_prep_live_ignition_json.storage.files | default([]) }}"
    current_units: "{{ _sno_prep_live_ignition_json.systemd.units | default([]) }}"

    _sno_prep_bridge_static: >-
      {{ sno_net.type == 'bridge' and sno_net.bridge.mode == 'static' }}
    _sno_prep_nat_public_wildcard: >-
      {{
        sno_net.type == 'nat'
        and sno_prep_dns.mode == 'public_wildcard'
      }}
    _sno_prep_static_resolver: >-
      {{
        (sno_net.type == 'bridge' and sno_net.bridge.mode == 'static')
        or (
          sno_net.type == 'nat'
          and sno_prep_dns.mode == 'public_wildcard'
        )
      }}
    _sno_prep_bridge_dhcp_public_wildcard: >-
      {{
        sno_net.type == 'bridge'
        and sno_net.bridge.mode == 'dhcp'
        and sno_prep_dns.mode == 'public_wildcard'
      }}
    # Persistent hostname file path
    _sno_prep_hostname_path: "/etc/hostname"

    # Prevent NetworkManager from overwriting/removing hostname
    _sno_prep_nm_hostname_conf_path: >-
      /etc/NetworkManager/conf.d/99-sno-hostname.conf

    # Keep resolver configuration deterministic for public-wildcard lab nodes.
    #
    # NetworkManager derives a DNS search domain from a dotted static hostname.
    # That breaks public wildcard DNS modes because names such as quay.io can be
    # tried as quay.io.<cluster-domain> and resolve back to the node IP.
    _sno_prep_nm_dns_conf_path: >-
      /etc/NetworkManager/conf.d/98-sno-dns.conf
    _sno_prep_resolv_conf_path: "/etc/resolv.conf"
    _sno_prep_resolver_script_path: "/usr/local/sbin/sno-write-resolv-conf"
    _sno_prep_resolver_dispatcher_path: >-
      /etc/NetworkManager/dispatcher.d/90-sno-resolv-conf
    _sno_prep_resolver_service_name: "sno-resolv-conf.service"

    # Static NetworkManager profile path
    #
    # Only used for bridge/static mode
    #
    _sno_prep_nmconnection_path: >-
      /etc/NetworkManager/system-connections/{{ sno_prep_box.hostname }}.nmconnection

    # Bootstrap-in-place post-reboot FCC path
    #
    # This file is applied after the bootstrap reboot.
    # Hostname persistence must be added here as well,
    # otherwise the final node may fall back to localhost.localdomain.
    #
    _sno_prep_master_update_fcc_path: >-
      /opt/openshift/bootstrap-in-place/master-update.fcc

    # Base64 encoded hostname content
    #
    # Example:
    # pubbox1.pubbox.192-168-2-15.sslip.io
    #
    _sno_prep_hostname:
      content: "{{ (sno_prep_dns.node_fqdn ~ '\n') | b64encode }}"

    # Disable NetworkManager hostname management
    #
    # Otherwise NM may reset hostname back to localhost/localdomain
    #
    _sno_prep_nm_hostname_conf:
      content: "{{ '[main]\nhostname-mode=none\n' | b64encode }}"

    _sno_prep_static_dns_servers: >-
      {{
        [sno_net.nat.gateway]
        if _sno_prep_nat_public_wildcard | bool
        else (
          (sno_net.bridge.specs.static | default({})).dns
          | default(
              [(sno_net.bridge.specs.static | default({})).gw]
              if (sno_net.bridge.specs.static | default({})).gw is defined
              else []
            )
        )
      }}
    _sno_prep_resolv_conf_text: |
      {% for dns_server in _sno_prep_static_dns_servers %}
      nameserver {{ dns_server }}
      {% endfor %}
    _sno_prep_nm_dns_conf:
      content: "{{ '[main]\ndns=none\n' | b64encode }}"
    _sno_prep_resolv_conf:
      content: "{{ _sno_prep_resolv_conf_text | b64encode }}"
    _sno_prep_resolver_script: |
      #!/usr/bin/env bash
      set -euo pipefail

      preferred_iface="${1:-}"

      get_dns() {
        local iface="$1"
        nmcli -g IP4.DNS dev show "$iface" 2>/dev/null \
          | tr '|' '\n' \
          | awk '{$1=$1} NF { print }' \
          || true
      }

      if [ -n "$preferred_iface" ]; then
        dns_servers="$(get_dns "$preferred_iface")"
      else
        dns_servers="$(
          nmcli -t -f DEVICE,STATE dev status \
            | awk -F: '$2 == "connected" { print $1 }' \
            | while read -r dev; do get_dns "$dev"; done
        )"
      fi

      dns_servers="$(
        printf '%s\n' "$dns_servers" \
          | awk 'NF && !seen[$0]++'
      )"

      [ -n "$dns_servers" ] || exit 0

      tmp="$(mktemp /run/sno-resolv.XXXXXX)"
      {
        echo "# Generated by SNObox"
        printf '%s\n' "$dns_servers" | while read -r dns; do
          echo "nameserver $dns"
        done
      } > "$tmp"

      install -m 0644 "$tmp" /etc/resolv.conf
      rm -f "$tmp"
    _sno_prep_resolver_dispatcher: |
      #!/usr/bin/env bash
      set -euo pipefail

      iface="${1:-}"
      action="${2:-}"

      case "$action" in
        up|dhcp4-change|connectivity-change)
          /usr/local/sbin/sno-write-resolv-conf "$iface"
          ;;
      esac
    _sno_prep_resolver_service: |
      [Unit]
      Description=Write resolv.conf without NetworkManager search domains
      Wants=NetworkManager-wait-online.service
      After=NetworkManager-wait-online.service

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/sno-write-resolv-conf

      [Install]
      WantedBy=multi-user.target

    # Decode embedded bootstrap-in-place post-reboot FCC
    #
    # master-update.fcc is stored as a base64 data URL inside
    # bootstrap-in-place-for-live-iso.ign.
    #
    master_update_fcc_raw: >-
      {{
        (
          current_files
          | selectattr('path', 'equalto', _sno_prep_master_update_fcc_path)
          | first
        ).contents.source
        | regex_replace('^data:text/plain;charset=utf-8;base64,', '')
        | b64decode
      }}

    # Patch master-update.fcc.
    #
    # OKD 5.0 can already contain hostname-related storage.files entries in the
    # generated master-update.fcc. Parse the FCC as YAML and replace only the
    # SNObox-managed paths to avoid duplicate entries on new installer output
    # and on reruns.
    #
    master_update_fcc_config: "{{ master_update_fcc_raw | from_yaml }}"
    master_update_fcc_current_files: >-
      {{
        master_update_fcc_config.storage.files
        | default([])
      }}
    master_update_fcc_current_units: >-
      {{
        master_update_fcc_config.systemd.units
        | default([])
      }}
    master_update_fcc_hostname_file_entry:
      path: "{{ _sno_prep_hostname_path }}"
      mode: 420
      overwrite: true
      contents:
        inline: "{{ sno_prep_dns.node_fqdn ~ '\n' }}"
    master_update_fcc_nm_hostname_conf_file_entry:
      path: "{{ _sno_prep_nm_hostname_conf_path }}"
      mode: 420
      overwrite: true
      contents:
        inline: "[main]\nhostname-mode=none\n"
    master_update_fcc_nm_dns_conf_file_entry:
      path: "{{ _sno_prep_nm_dns_conf_path }}"
      mode: 420
      overwrite: true
      contents:
        inline: "[main]\ndns=none\n"
    master_update_fcc_resolv_conf_file_entry:
      path: "{{ _sno_prep_resolv_conf_path }}"
      mode: 420
      overwrite: true
      contents:
        inline: "{{ _sno_prep_resolv_conf_text }}"
    master_update_fcc_resolver_script_file_entry:
      path: "{{ _sno_prep_resolver_script_path }}"
      mode: 493
      overwrite: true
      contents:
        inline: "{{ _sno_prep_resolver_script }}"
    master_update_fcc_resolver_dispatcher_file_entry:
      path: "{{ _sno_prep_resolver_dispatcher_path }}"
      mode: 493
      overwrite: true
      contents:
        inline: "{{ _sno_prep_resolver_dispatcher }}"
    master_update_fcc_updated_files: >-
      {{
        (
          master_update_fcc_current_files
          | rejectattr('path', 'equalto', _sno_prep_hostname_path)
          | rejectattr('path', 'equalto', _sno_prep_nm_hostname_conf_path)
          | rejectattr('path', 'equalto', _sno_prep_nm_dns_conf_path)
          | rejectattr('path', 'equalto', _sno_prep_resolv_conf_path)
          | rejectattr('path', 'equalto', _sno_prep_resolver_script_path)
          | rejectattr('path', 'equalto', _sno_prep_resolver_dispatcher_path)
          | list
        )
        + [
            master_update_fcc_hostname_file_entry,
            master_update_fcc_nm_hostname_conf_file_entry
          ]
        + (
            [
              master_update_fcc_nm_dns_conf_file_entry,
              master_update_fcc_resolv_conf_file_entry
            ]
            if _sno_prep_static_resolver | bool
            else []
          )
        + (
            [
              master_update_fcc_nm_dns_conf_file_entry,
              master_update_fcc_resolver_script_file_entry,
              master_update_fcc_resolver_dispatcher_file_entry
            ]
            if _sno_prep_bridge_dhcp_public_wildcard | bool
            else []
          )
      }}
    master_update_fcc_resolver_service_unit_entry:
      name: "{{ _sno_prep_resolver_service_name }}"
      enabled: true
      contents: "{{ _sno_prep_resolver_service }}"
    master_update_fcc_updated_units: >-
      {{
        (
          master_update_fcc_current_units
          | rejectattr('name', 'equalto', _sno_prep_resolver_service_name)
          | list
        )
        + (
            [master_update_fcc_resolver_service_unit_entry]
            if _sno_prep_bridge_dhcp_public_wildcard | bool
            else []
          )
      }}
    master_update_fcc_updated_storage: >-
      {{
        master_update_fcc_config.storage
        | default({})
        | combine({'files': master_update_fcc_updated_files})
      }}
    master_update_fcc_updated_systemd: >-
      {{
        master_update_fcc_config.systemd
        | default({})
        | combine({'units': master_update_fcc_updated_units})
      }}
    master_update_fcc_updated_config: >-
      {{
        master_update_fcc_config
        | combine({
            'storage': master_update_fcc_updated_storage,
            'systemd': master_update_fcc_updated_systemd
          })
      }}
    master_update_fcc_updated: "{{ master_update_fcc_updated_config | to_nice_yaml }}"

    # Static NetworkManager profile
    #
    # Contains:
    # - static IP
    # - gateway
    # - DNS
    # - MAC binding
    #
    # Only injected for bridge/static mode
    #
    nmconnection_file_entry:
      path: "{{ _sno_prep_nmconnection_path }}"
      mode: 384
      overwrite: true
      contents:
        source: >-
          data:text/plain;charset=utf-8;base64,{{ _sno_prep_nmconnection.content }}

    # Persistent hostname file
    #
    # Required so node-valid-hostname.service succeeds
    #
    hostname_file_entry:
      path: "{{ _sno_prep_hostname_path }}"
      mode: 420
      overwrite: true
      contents:
        source: >-
          data:text/plain;charset=utf-8;base64,{{ _sno_prep_hostname.content }}

    # NetworkManager hostname override config
    #
    # Prevents NM from removing/resetting hostname
    #
    nm_hostname_conf_file_entry:
      path: "{{ _sno_prep_nm_hostname_conf_path }}"
      mode: 420
      overwrite: true
      contents:
        source: >-
          data:text/plain;charset=utf-8;base64,{{ _sno_prep_nm_hostname_conf.content }}

    # NetworkManager DNS override
    #
    # Prevents NM from deriving resolver search domains from /etc/hostname
    #
    nm_dns_conf_file_entry:
      path: "{{ _sno_prep_nm_dns_conf_path }}"
      mode: 420
      overwrite: true
      contents:
        source: >-
          data:text/plain;charset=utf-8;base64,{{ _sno_prep_nm_dns_conf.content }}

    # Static resolver config
    #
    # Used together with NetworkManager dns=none for static resolver nodes
    #
    resolv_conf_file_entry:
      path: "{{ _sno_prep_resolv_conf_path }}"
      mode: 420
      overwrite: true
      contents:
        source: >-
          data:text/plain;charset=utf-8;base64,{{ _sno_prep_resolv_conf.content }}

    resolver_script_file_entry:
      path: "{{ _sno_prep_resolver_script_path }}"
      mode: 493
      overwrite: true
      contents:
        source: >-
          data:text/plain;charset=utf-8;base64,{{
            _sno_prep_resolver_script | b64encode
          }}

    resolver_dispatcher_file_entry:
      path: "{{ _sno_prep_resolver_dispatcher_path }}"
      mode: 493
      overwrite: true
      contents:
        source: >-
          data:text/plain;charset=utf-8;base64,{{
            _sno_prep_resolver_dispatcher | b64encode
          }}

    resolver_service_unit_entry:
      name: "{{ _sno_prep_resolver_service_name }}"
      enabled: true
      contents: "{{ _sno_prep_resolver_service }}"

    # Patched bootstrap-in-place post-reboot FCC
    #
    # Required so hostname survives the bootstrap reboot
    #
    master_update_fcc_file_entry:
      path: "{{ _sno_prep_master_update_fcc_path }}"
      mode: 420
      overwrite: true
      contents:
        source: >-
          data:text/plain;charset=utf-8;base64,{{
            master_update_fcc_updated | b64encode
          }}

    # Final managed ignition file entries
    #
    # bridge/static:
    #   hostname + NM hostname config + static NM profile + static resolver
    #
    # nat + public_wildcard:
    #   hostname + NM hostname config + static resolver
    #
    # bridge/dhcp + public_wildcard:
    #   hostname + NM hostname config + dispatcher-managed resolver
    #
    # bootstrap reboot:
    #   patched master-update.fcc
    new_files_list: >-
      {{
        (
          current_files
          | rejectattr('path', 'equalto', _sno_prep_hostname_path)
          | rejectattr('path', 'equalto', _sno_prep_nm_hostname_conf_path)
          | rejectattr('path', 'equalto', _sno_prep_nm_dns_conf_path)
          | rejectattr('path', 'equalto', _sno_prep_resolv_conf_path)
          | rejectattr('path', 'equalto', _sno_prep_resolver_script_path)
          | rejectattr('path', 'equalto', _sno_prep_resolver_dispatcher_path)
          | rejectattr('path', 'equalto', _sno_prep_nmconnection_path)
          | rejectattr('path', 'equalto', _sno_prep_master_update_fcc_path)
          | list
        )
        + (
            [nmconnection_file_entry]
            if _sno_prep_bridge_static | bool
            else []
          )
        + [
            hostname_file_entry,
            nm_hostname_conf_file_entry,
            master_update_fcc_file_entry
          ]
        + (
            [
              nm_dns_conf_file_entry,
              resolv_conf_file_entry
            ]
            if _sno_prep_static_resolver | bool
            else []
          )
        + (
            [
              nm_dns_conf_file_entry,
              resolver_script_file_entry,
              resolver_dispatcher_file_entry
            ]
            if _sno_prep_bridge_dhcp_public_wildcard | bool
            else []
          )
      }}
    new_units_list: >-
      {{
        (
          current_units
          | rejectattr('name', 'equalto', _sno_prep_resolver_service_name)
          | list
        )
        + (
            [resolver_service_unit_entry]
            if _sno_prep_bridge_dhcp_public_wildcard | bool
            else []
          )
      }}

    # Merge updated files into ignition storage section
    updated_storage: >-
      {{
        _sno_prep_live_ignition_json.storage
        | default({})
        | combine({'files': new_files_list})
      }}
    updated_systemd: >-
      {{
        _sno_prep_live_ignition_json.systemd
        | default({})
        | combine({'units': new_units_list})
      }}

    # Build final ignition document
    updated_ignition: >-
      {{
        _sno_prep_live_ignition_json
        | combine({
            'storage': updated_storage,
            'systemd': updated_systemd
          })
      }}
  when:
    - sno_prep_dns.node_fqdn is defined
    - sno_prep_dns.node_fqdn | length > 0

- name: Patch live ISO with generated ignition file
  ansible.builtin.command: >
    {{ sno_prep_workdirs.bin }}/coreos-installer
    iso ignition embed
    -fi {{ sno_prep_workdirs.ocp }}/bootstrap-in-place-for-live-iso.ign
    {{ sno_prep_workdirs.downloads_rhcos }}/{{ sno_prep_live_iso_file }}
  delegate_to: localhost
  changed_when: true
